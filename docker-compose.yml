version: '3.8'

services:
  sentinel-core:
    build: .
    container_name: sentinel-core
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=8000
    networks:
      - sentinel-net

  sandbox-app:
    build: .
    container_name: sandbox-app
    ports:
      - "8001:8001"
    command: ["python", "sandbox/vulnerable_app.py"]
    networks:
      - sentinel-net

networks:
  sentinel-net:
    driver: bridge
